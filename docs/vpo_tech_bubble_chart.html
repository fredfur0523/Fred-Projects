};

// ═══════════════════════════════════════════════════════════════════
// 3. Parse + enrich
// ═══════════════════════════════════════════════════════════════════
const ZONE_COLOR = { AFR:'#D97706', SAZ:'#059669', MAZ:'#2563EB', NAZ:'#7C3AED', EUR:'#DB2777', APAC:'#EA580C' };
const VPO_LABELS = { 1:'NB', 2:'Basic', 3:'INT', 4:'SUS', 5:'EXC', 6:'WC' };

// VPO proxy by zone (with India exception)
function getVPO(zone, country) {
  if (zone === 'NAZ') return 4;
  if (zone === 'MAZ') return 3;
  if (zone === 'SAZ') return 3;
  if (zone === 'EUR') return 2;
  if (zone === 'APAC') return (country === 'India') ? 4 : 3;
  if (zone === 'AFR') return 1;
  return 2;
}

// Fuzzy match site name to OSE key
function matchOSE(site, zone) {
  const low = site.toLowerCase().replace(/[^a-z0-9]/g, '');
  // Direct and partial matches
  const mappings = {
    'zacatecas': 'ZACATECAS', 'tocancipa': 'Tocancipa', 'mexico apan': 'Mexico Apan',
    'st. louis': 'St. Louis', 'rio de janeiro': 'Rio de Janeiro', 'tuxtepec': 'Tuxtepec',
    'houston': 'Houston', 'mexico plant': 'Mexico Plant', 'sete lagoas': 'Sete Lagoas',
    'putian': 'Putian (New)', 'accra': 'Accra Beer', 'san pedro sula csd': 'San Pedro Sula CSD',
    'jacksonville': 'Jacksonville', 'alrode': 'Alrode Beer', 'foshan': 'Foshan',
    'pernambuco': null, 'columbus': 'Columbus', 'ate': 'Ate Beer',
    'fort collins': 'Fort Collins', 'baldwinsville': 'Baldwinsville', 'los angeles': 'Los Angeles',
    'jundiai': 'Jundiai', 'jacarei': 'Jacarei', 'cartersville': 'Cartersville',
    'itapissuma': 'Itapissuma', 'uberlandia': 'Uberlandia', 'agudos': 'Agudos',
    'magor': 'Magor', 'williamsburg': 'Williamsburg', 'jaguariuna': 'Jaguariuna',
    'pirai': 'Pirai', 'icheon': 'Icheon', 'leuven': 'Leuven', 'prospecton': 'Prospecton',
    'viamao': 'Viamao', 'camacari': 'Camacari', 'inanda': null, 'aquiraz': 'Aquiraz',
    'sur': 'Pompeya', 'quilmes': 'Quilmes', 'santo domingo': 'Santo Domingo',
    'ind la constancia water': 'Ind La Constancia Water', 'guadalajara': 'GUADALAJARA',
    'boyaca': 'Boyaca', 'bremen': 'Bremen', 'barranquilla': 'Barranquilla',
    'ind la constancia csd': 'Ind La Constancia CSD', 'ponta grossa': 'Ponta Grossa',
    'newlands': 'Newlands', 'samlesbury': 'Samlesbury', 'medellin': 'Medellin',
    'wuhan': 'Wuhan', 'ypane': 'Ypane', 'jupille': 'Jupille', 'sergipe': 'Estancia',
    'zarate': 'Zarate', 'quilmes 2': null, 'equatorial': null, 'jinshibai': 'Jinshibai',
    'guayaquil': null, 'cachoeiras': 'Cachoeiras de Macacu', 'shiliang': 'Shiliang',
    'chamdor': 'Chamdor', 'motupe': 'Motupe Beer', 'london': 'London',
    'gwangju': 'Gwangju', 'cheongwon': 'Cheongwon', 'harbin 2': 'Harbin 2',
    'lages': 'Lages', 'merida': 'Merida', 'ziyang': 'Ziyang',
    'dar es salaam': 'Dar es Salaam', 'torreon': 'TORREON', 'suqian': 'Suqian',
    'wenzhou': 'Wenzhou', 'guarulhos': 'Guarulhos', 'cuiaba': 'Cuiaba',
    'montreal': 'Montreal', 'teresina': 'Teresina', 'sapucaia': 'Sapucaia do Sul',
    'macacu': 'Cachoeiras de Macacu', 'quito': 'Quito', 'gateway': 'Gateway Brewery',
    'nanchang 1': null, 'san pedro sula': 'San Pedro Sula Beer', 'munich': 'Munich',
    'manaus': 'Manaus', 'nanning': 'Nanning', 'bucaramanga': 'Bucaramanga',
    'xinxiang': 'Xinxiang', 'wernigerode': 'Wernigerode', 'san juan': 'San Juan',
    'zhangzhou': 'Zhangzhou', 'tangshan 2': 'Tangshan 2',
    'ind la constancia': 'Ind La Constancia Beer', 'panama': 'Panama Beer',
    'mendoza': 'Mendoza', 'ibhayi': 'Ibhayi', 'onitsha': 'Onitsha',
    'arequipa': 'Arequipa', 'marracuene': 'Marracuene', 'santa cruz bo': 'Santa Cruz',
    'armenia': null, 'jinja': 'Jinja Beer', 'ilesa': 'Ilesa', 'edmonton': 'Edmonton',
    'lusaka': 'Lusaka Beer', 'baoding': 'Baoding', 'corrientes': 'Corrientes',
    'hato nuevo': 'Hato Nuevo', 'el alto': 'El Alto', 'curitibana': null,
    'maputo': 'Maputo', 'port harcourt': 'Port Harcourt', 'aurangabad': 'Aurangabad',
    'ilorin': null, 'dommelen': 'Dommelen', 'tucuman': null, 'hoegaarden': 'Hoegaarden',
    'jinzhou': 'Jinzhou', 'mysore': 'Mysore', 'cusco': 'Cusco', 'nantong': 'Nantong',
    'cochabamba': 'Cochabamba', 'sonipat': 'Sonipat', 'huachipa': null,
    'mbarara': 'Mbarara', 'jishui': 'Jishui', 'nampula': 'Nampula',
    'mudanjiang': 'Mudanjiang(New)', 'cordoba': 'Cordoba', 'mazatlan': 'MAZATLAN',
    'la paz': 'La Paz', 'mwanza': 'Mwanza', 'mbeya': 'Mbeya',
    'hyderabad': 'Hyderabad', 'charminar': 'Charminar', 'kunming': 'Kunming',
    'polokwane': 'Polokwane', 'las palmas': 'Las Palmas', 'huari': 'Huari',
    'halifax': 'Halifax', 'rosslyn2': 'Rosslyn', 'jiamusi': 'Jiamusi New',
    'wugang': 'Wugang', 'daqing': null, 'yingkou': 'Yingkou', 'xinyang': 'Xinyang',
    'creston': 'Creston', 'hbp': 'VSIP', 'issum': 'Issum', 'rohtak': null,
    'santa cruz sabm': 'Santa Cruz (SABM)', 'myphuoc': 'MyPhuoc', 'eswatini': 'Eswatini',
    'zacapa': 'Zacapa', 'namibia': 'Namibia Beer', 'meerut': 'Meerut',
    'kgalagadi': 'Kgalagadi Beer', 'lesotho': 'Lesotho Beer',
    'rosslyn': 'Rosslyn', 'beira': 'Beira'
  };
  const key = mappings[site.toLowerCase()];
  if (key && OSE_RAW[key] !== undefined) return OSE_RAW[key];
  // Fallback: try substring match
  for (const [k,v] of Object.entries(OSE_RAW)) {
    if (k.toLowerCase().includes(low) || low.includes(k.toLowerCase().replace(/[^a-z0-9]/g,''))) return v;
  }
  return null;
}

// Parse CSV
const lines = CSV_RAW.trim().split('\n').slice(1);
const sites = lines.map(l => {
  const c = l.split(',');
  const zone = c[0], site = c[1], country = c[2];
  const volume = parseInt(c[3]) || 0;
  const techScore = parseFloat(c[13]) || 0;
  // Compute average of 9 domain scores (cols 4-12) for a continuous tech score
  const domainScores = [];
  for (let i = 4; i <= 12; i++) domainScores.push(parseFloat(c[i]) || 0);
  const techAvg = domainScores.reduce((a,b) => a+b, 0) / domainScores.length;
  const vpo = getVPO(zone, country);
  const ose = matchOSE(site, zone);
  return { zone, site, country, volume, techScore: Math.round(techAvg * 100) / 100, techLevel: parseInt(c[13]) || 0, vpo, ose };
});

// Normalize bubble radius
const volumes = sites.map(s => s.volume);
const minVol = Math.min(...volumes), maxVol = Math.max(...volumes);
const R_MIN = 6, R_MAX = 30;
function radius(v) {
  if (maxVol === minVol) return (R_MIN + R_MAX) / 2;
  const ratio = (v - minVol) / (maxVol - minVol);
  return R_MIN + Math.sqrt(ratio) * (R_MAX - R_MIN); // sqrt for area-proportional
}

// Add small jitter to avoid perfect overlap
function jitter(val, amount) { return val + (Math.random() - 0.5) * amount; }

// ═══════════════════════════════════════════════════════════════════
// 4. Build Chart.js datasets (one per zone)
// ═══════════════════════════════════════════════════════════════════
const TECH_THRESHOLD = 1.3;
const VPO_THRESHOLD = 3;

const zoneGroups = {};
sites.forEach(s => {
  if (!zoneGroups[s.zone]) zoneGroups[s.zone] = [];
  zoneGroups[s.zone].push(s);
});

const datasets = Object.entries(zoneGroups).map(([zone, items]) => ({
  label: zone,
  data: items.map(s => ({
    x: jitter(s.techScore, 0.08),
    y: jitter(s.vpo, 0.15),
    r: radius(s.volume),
    _site: s.site, _zone: s.zone, _country: s.country,
    _tech: s.techScore, _vpo: s.vpo, _vol: s.volume, _ose: s.ose, _techLevel: s.techLevel,
    _bundle: (s.techScore >= TECH_THRESHOLD && s.vpo >= VPO_THRESHOLD) ? 4 :
             (s.techScore >= TECH_THRESHOLD && s.vpo < VPO_THRESHOLD) ? 3 :
             (s.techScore < TECH_THRESHOLD && s.vpo >= VPO_THRESHOLD) ? 2 : 1
  })),
  backgroundColor: ZONE_COLOR[zone] + 'B3', // 0.7 opacity
  borderColor: items.map(s => {
    const isB4 = s.techScore >= TECH_THRESHOLD && s.vpo >= VPO_THRESHOLD;
    return isB4 ? '#FFD700' : (ZONE_COLOR[zone] || '#888');
  }),
  borderWidth: items.map(s => {
    const isB4 = s.techScore >= TECH_THRESHOLD && s.vpo >= VPO_THRESHOLD;
    return isB4 ? 3 : 1;
  }),
}));

// ═══════════════════════════════════════════════════════════════════
// 5. Legend
// ═══════════════════════════════════════════════════════════════════
const legendEl = document.getElementById('legend');
Object.entries(ZONE_COLOR).forEach(([z, c]) => {
  const n = (zoneGroups[z] || []).length;
  legendEl.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${z} (${n})</div>`;
});
legendEl.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:transparent;border:2px solid #FFD700"></div>Bundle 4 (gold border)</div>`;

// ═══════════════════════════════════════════════════════════════════
// 6. Render Chart
// ═══════════════════════════════════════════════════════════════════
Chart.register(ChartDataLabels);

const ctx = document.getElementById('bubble').getContext('2d');
new Chart(ctx, {
  type: 'bubble',
  data: { datasets },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    layout: { padding: { top: 30, right: 30, bottom: 10, left: 10 } },
    scales: {
      x: {
        min: -0.2, max: 3.2,
        title: { display: true, text: 'Tech Maturity Score (avg 9 domains, 0–3)', color: '#ccc', font: { size: 14 } },
        ticks: { color: '#aaa', stepSize: 0.5 },
        grid: { color: '#ffffff10' },
      },
      y: {
        min: 0.3, max: 6.5,
        title: { display: true, text: 'VPO Score (zone proxy)', color: '#ccc', font: { size: 14 } },
        ticks: {
          color: '#aaa', stepSize: 1,
          callback: v => VPO_LABELS[v] ? `${v} (${VPO_LABELS[v]})` : ''
        },
        grid: { color: '#ffffff10' },
      }
    },
    plugins: {
      legend: { display: false },
      datalabels: {
        display: ctx => ctx.dataset.data[ctx.dataIndex].r > 16,
        color: '#fff',
        font: { size: 9, weight: 'bold' },
        formatter: (v, ctx) => ctx.dataset.data[ctx.dataIndex]._site.substring(0, 10),
        anchor: 'center', align: 'center',
        textShadowBlur: 3, textShadowColor: '#000',
      },
      tooltip: {
        callbacks: {
          label: ctx => {
            const d = ctx.raw;
            const oseStr = d._ose !== null ? `${d._ose.toFixed(1)}%` : 'N/A';
            return [
              `${d._site} (${d._zone})`,
              `Country: ${d._country}`,
              `Tech Score: ${d._tech.toFixed(2)} (Level ${d._techLevel})`,
              `VPO: ${d._vpo} (${VPO_LABELS[d._vpo] || '?'})`,
              `Volume: ${d._vol.toLocaleString()} hL`,
              `OSE: ${oseStr}`,
              `Bundle: ${d._bundle}`
            ];
          }
        },
        backgroundColor: '#1e293b', titleColor: '#f0f0f0', bodyColor: '#ccc',
        borderColor: '#334155', borderWidth: 1, padding: 12,
      },
      annotation: undefined // handled below
    }
  },
  plugins: [{
    id: 'quadrantLines',
    afterDraw(chart) {
      const { ctx, chartArea: { left, right, top, bottom }, scales: { x, y } } = chart;
      // Vertical reference line at Tech = 1.3
      const xPx = x.getPixelForValue(TECH_THRESHOLD);
      ctx.save();
      ctx.strokeStyle = '#ffffff30';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 6]);
      ctx.beginPath(); ctx.moveTo(xPx, top); ctx.lineTo(xPx, bottom); ctx.stroke();
      // Horizontal reference line at VPO = 3
      const yPx = y.getPixelForValue(VPO_THRESHOLD);
      ctx.beginPath(); ctx.moveTo(left, yPx); ctx.lineTo(right, yPx); ctx.stroke();
      ctx.setLineDash([]);

      // Quadrant labels
      ctx.font = 'bold 12px Segoe UI, sans-serif';
      ctx.fillStyle = '#ffffff40';
      ctx.textAlign = 'center';
      // B1 bottom-left
      ctx.fillText('B1: VPO Low + Tech Low', (left + xPx) / 2, bottom - 14);
      // B2 top-left
      ctx.fillText('B2: VPO High + Tech Low', (left + xPx) / 2, top + 18);
      // B3 bottom-right
      ctx.fillText('B3: VPO Low + Tech High', (xPx + right) / 2, bottom - 14);
      // B4 top-right
      ctx.fillStyle = '#ffd70060';
      ctx.fillText('★ B4: VPO High + Tech High', (xPx + right) / 2, top + 18);
      ctx.restore();
    }
  }]
});

// ═══════════════════════════════════════════════════════════════════
// 7. Stats cards
// ═══════════════════════════════════════════════════════════════════
const bundles = { 1: [], 2: [], 3: [], 4: [] };
sites.forEach(s => {
  const b = (s.techScore >= TECH_THRESHOLD && s.vpo >= VPO_THRESHOLD) ? 4 :
            (s.techScore >= TECH_THRESHOLD && s.vpo < VPO_THRESHOLD) ? 3 :
            (s.techScore < TECH_THRESHOLD && s.vpo >= VPO_THRESHOLD) ? 2 : 1;
  bundles[b].push(s);
});

const statsEl = document.getElementById('stats');
const bundleInfo = [
  { n: 1, cls: 'b1', title: 'Bundle 1', desc: 'VPO Low + Tech Low — Need both process & tech investment' },
  { n: 2, cls: 'b2', title: 'Bundle 2', desc: 'VPO High + Tech Low — Ready for tech acceleration' },
  { n: 3, cls: 'b3', title: 'Bundle 3', desc: 'VPO Low + Tech High — Tech ahead of process maturity' },
  { n: 4, cls: 'b4', title: 'Bundle 4', desc: 'VPO High + Tech High — Best cluster, optimize & scale' },
];
bundleInfo.forEach(b => {
  const list = bundles[b.n];
  const totalVol = list.reduce((a, s) => a + s.volume, 0);
  statsEl.innerHTML += `
    <div class="stat-card ${b.cls}">
      <h3>${b.title}</h3>
      <div class="val">${list.length}</div>
      <div class="desc">${b.desc}</div>
      <div class="desc" style="margin-top:6px;color:#999">${(totalVol/1e6).toFixed(1)}M hL total</div>
    </div>`;
});

// Total sites card
statsEl.innerHTML += `
  <div class="stat-card">
    <h3>Total Breweries</h3>
    <div class="val" style="color:#60a5fa">${sites.length}</div>
    <div class="desc">Plotted from Coverage Dashboard</div>
    <div class="desc" style="margin-top:6px;color:#999">${sites.filter(s=>s.ose!==null).length} with OSE data</div>
  </div>`;

// ═══════════════════════════════════════════════════════════════════
// 8. Footnote
// ═══════════════════════════════════════════════════════════════════
document.getElementById('footnote').textContent =
  'Data sources: Tech Maturity = Coverage Dashboard CSV_DATA (9-domain avg, 0–3 scale) · ' +
  'VPO = Zone proxy (NAZ=4/SUS, MAZ=3/INT, SAZ=3/INT, EUR=2/Basic, APAC=3 except India=4, AFR=1/NB) · ' +
  'OSE = Anaplan PG-K4038 avg 2025 · Volume = Annual hL from Coverage Dashboard. ' +
  'Limitations: VPO is zone-level proxy (not plant-specific); OSE match is fuzzy by plant name; ' +
  'some sites may lack OSE data; Tech Score computed as avg of 9 domain scores (BP,DA,UT,MT,MG,MDM,PP,QL,SF). ' +
  'Bubble positions include small jitter to reduce overlap. Generated ' + new Date().toISOString().slice(0,10) + '.';
</script>
